name: Supabase E2E Keep Alive

on:
  schedule:
    # Daily ping to prevent the dedicated E2E Supabase project from auto-pausing.
    - cron: "23 12 * * *"
  workflow_dispatch:

jobs:
  ping-e2e-supabase:
    name: Ping E2E Supabase REST API
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Check E2E Supabase health
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${NEXT_PUBLIC_SUPABASE_URL}" ]]; then
            echo "NEXT_PUBLIC_SUPABASE_URL is required for the E2E Supabase keep-alive check." >&2
            exit 1
          fi

          if [[ -z "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" ]]; then
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY is required for the E2E Supabase keep-alive check." >&2
            exit 1
          fi

          supabase_url="${NEXT_PUBLIC_SUPABASE_URL%/}/rest/v1/"

          if ! status_code="$(
            curl \
              --silent \
              --show-error \
              --output /tmp/supabase-e2e-keepalive-response.txt \
              --write-out "%{http_code}" \
              --max-time 20 \
              --retry 2 \
              --retry-delay 5 \
              --retry-connrefused \
              --header "apikey: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}" \
              --header "Authorization: Bearer ${NEXT_PUBLIC_SUPABASE_ANON_KEY}" \
              "${supabase_url}"
          )"; then
            echo "Supabase E2E keep-alive request failed before receiving a status code." >&2
            exit 1
          fi

          if [[ ! "${status_code}" =~ ^[0-9]{3}$ ]]; then
            echo "Supabase E2E keep-alive returned a non-numeric HTTP status: ${status_code}" >&2
            exit 1
          fi

          if [[ ! "${status_code}" =~ ^2[0-9]{2}$ ]]; then
            echo "Supabase E2E keep-alive expected a 2xx status, received ${status_code}." >&2
            exit 1
          fi

          echo "Supabase E2E keep-alive succeeded with HTTP ${status_code}."
