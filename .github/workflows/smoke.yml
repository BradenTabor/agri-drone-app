name: Smoke E2E

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CI: true

jobs:
  smoke-perimeter:
    name: Perimeter smoke (public + auth guards)
    runs-on: ubuntu-latest
    env:
      E2E_TEST_MODE: perimeter
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.E2E_PERIMETER_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.E2E_PERIMETER_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck, and unit tests
        run: npm run check

      - name: Build (requires Supabase public env at build time)
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run perimeter smoke tests
        run: npm run test:smoke:perimeter

  smoke-authenticated:
    name: Authenticated smoke (dedicated E2E project)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    env:
      E2E_TEST_MODE: authenticated
      # Prod denylist in supabase-project-guard.ts runs before allowlist — mis-set URL cannot target prod.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck, and unit tests
        run: npm run check

      - name: Build (requires Supabase public env at build time)
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run authenticated smoke tests
        run: npm run test:smoke:authenticated
